<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Align42 Test Runner</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-shape bg-a"></div>
  <div class="bg-shape bg-b"></div>

  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-row">
          <img class="brand-logo" src="logo-align42.svg" alt="Align42 logo" />
          <h1>Align42 Test Runner</h1>
        </div>
        <p>Standalone synthetic-data test page for core and dependency suites.</p>
      </div>
      <div class="actions">
        <a class="btn ghost" href="Align42.html">Back to Align42</a>
      </div>
    </header>

    <main class="container card content test-page">
      <div class="actions" style="margin-bottom: 0.75rem;">
        <button class="btn primary" id="runAllBtn">Run All Tests</button>
        <button class="btn secondary" id="runCoreBtn">Run Core Tests</button>
        <button class="btn secondary" id="runDependencyBtn">Run Dependency Tests</button>
        <button class="btn ghost" id="clearBtn">Clear Results</button>
      </div>

      <section class="question">
        <h3>Overall Result</h3>
        <div id="overallResults"></div>
      </section>

      <section class="test-grid">
        <div class="question">
          <h3>Core Suite</h3>
          <p class="hint">Business logic tests using synthetic assessment data.</p>
          <div id="coreResults"></div>
        </div>

        <div class="question">
          <h3>Dependency Suite</h3>
          <p class="hint">Simulated external dependencies (OpenAI adapter and dictation adapter).</p>
          <div id="dependencyResults"></div>
        </div>
      </section>
    </main>
  </div>

  <script src="tests.js?v=20260214-1"></script>
</body>
</html>
