name: Test Suite

on:
  push:
    branches:
      - main
      - 'codex/**'
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run automated tests
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./scripts/run_tests.sh
          ./scripts/run_tests.sh
