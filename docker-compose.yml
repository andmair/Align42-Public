services:
  align42:
    build:
      context: .
      dockerfile: Dockerfile
    image: align42:local
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
    volumes:
      - .:/app
      - /app/__pycache__
    restart: unless-stopped
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - __pycache__
            - .git
