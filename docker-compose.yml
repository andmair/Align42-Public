services:
  align42:
    build:
      context: .
      dockerfile: Dockerfile
    image: align42:local
    ports:
      - "8000:8000"
    environment:
      PORT: "8000"
    volumes:
      - .:/app
      - /app/__pycache__
      - /app/uploads
    restart: unless-stopped
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - uploads
            - __pycache__
            - .git
